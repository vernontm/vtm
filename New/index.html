<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vernontm. - Build & Automate Without Limits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,700;0,800;1,200&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --orange: #ff9b26;
            --orange-dark: #ee4c27;
            --bg: #111112;
            --surface: #1a1a1c;
            --surface-2: #222226;
            --border: rgba(255,255,255,0.07);
            --text: #f0f0f0;
            --muted: #6b6b72;
            --font-display: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,155,38,0.09) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 80% 80%, rgba(238,76,39,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAV ── */
        nav {
            padding: 24px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: fadeDown 0.6s ease both;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 46px;
            width: auto;
            display: block;
            filter: brightness(1);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-links a {
            font-size: 0.875rem;
            font-weight: 400;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.01em;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--text); }

        .hamburger {
            width: 40px;
            height: 40px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 0;
            transition: all 0.2s;
        }

        .hamburger:hover {
            border-color: rgba(255,155,38,0.3);
            background: rgba(255,155,38,0.06);
        }

        .hamburger span {
            display: block;
            width: 18px;
            height: 1.5px;
            background: var(--text);
            border-radius: 2px;
            transition: all 0.3s;
        }

        /* ── HERO ── */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 20px 0;
            text-align: center;
        }

        .hero-icon {
            width: 56px;
            height: auto;
            margin-bottom: 20px;
            animation: fadeUp 0.7s 0.1s ease both;
            filter: brightness(0.95);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--orange);
            background: rgba(255,155,38,0.08);
            border: 1px solid rgba(255,155,38,0.2);
            padding: 6px 14px;
            border-radius: 100px;
            margin-bottom: 24px;
            animation: fadeUp 0.7s 0.1s ease both;
        }

        .eyebrow-dot {
            width: 6px;
            height: 6px;
            background: var(--orange);
            border-radius: 50%;
            animation: pulse 2.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .hero-heading {
            font-family: var(--font-display);
            font-size: clamp(2.6rem, 6.5vw, 5rem);
            font-weight: 300;
            line-height: 1.08;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            animation: fadeUp 0.7s 0.2s ease both;
            max-width: 760px;
        }

        .hero-heading em {
            font-style: normal;
            font-weight: 800;
            color: var(--orange);
            background: none;
            -webkit-text-fill-color: var(--orange);
        }

        .hero-sub {
            font-size: 0.975rem;
            color: var(--muted);
            font-weight: 300;
            margin-bottom: 36px;
            animation: fadeUp 0.7s 0.3s ease both;
        }

        /* ── CHAT BOX ── */
        .chat-container {
            width: 100%;
            max-width: 800px;
            animation: fadeUp 0.7s 0.4s ease both;
        }

        .chat-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255,155,38,0.04),
                0 24px 60px rgba(0,0,0,0.5),
                0 4px 20px rgba(0,0,0,0.3);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .chat-box:focus-within {
            border-color: rgba(255,155,38,0.25);
            box-shadow:
                0 0 0 1px rgba(255,155,38,0.1),
                0 24px 60px rgba(0,0,0,0.5),
                0 0 40px rgba(255,155,38,0.06);
        }

        /* Messages area */
        .messages {
            max-height: 280px;
            overflow-y: auto;
            padding: 0;
            display: none;
            flex-direction: column;
            gap: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--surface-2) transparent;
        }

        .messages.has-messages {
            display: flex;
            padding: 20px 24px 0;
            border-bottom: 1px solid var(--border);
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            padding: 0 0 4px 40px;
            animation: msgIn 0.3s ease;
        }

        .quick-reply-btn {
            padding: 7px 14px;
            background: rgba(255,155,38,0.08);
            border: 1px solid rgba(255,155,38,0.25);
            border-radius: 100px;
            color: var(--orange);
            font-family: var(--font-body);
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .quick-reply-btn:hover {
            background: rgba(255,155,38,0.15);
            border-color: rgba(255,155,38,0.45);
            transform: translateY(-1px);
            box-shadow: 0 3px 12px rgba(255,155,38,0.15);
        }

        .quick-reply-btn:active {
            transform: translateY(0);
        }

        .chat-cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            margin-left: 40px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            border: none;
            border-radius: 100px;
            color: white;
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            animation: msgIn 0.3s ease;
            box-shadow: 0 4px 14px rgba(255,155,38,0.25);
        }

        .chat-cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,155,38,0.35);
        }

        .chat-cta-btn:active {
            transform: translateY(0);
        }

        .message {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            animation: msgIn 0.3s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message + .message {
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            margin-top: 1px;
        }

        .msg-avatar.user-av {
            background: rgba(255,155,38,0.15);
            color: var(--orange);
            border: 1px solid rgba(255,155,38,0.2);
            font-family: var(--font-display);
        }

        .msg-avatar.ai-av {
            background: rgba(255,255,255,0.05);
            color: var(--muted);
            border: 1px solid var(--border);
            font-size: 14px;
        }

        .msg-body {
            flex: 1;
            font-size: 0.9rem;
            line-height: 1.65;
            font-weight: 300;
            padding-top: 4px;
            text-align: left;
        }

        .msg-body.user-msg { color: rgba(255,255,255,0.85); }
        .msg-body.ai-msg { color: rgba(255,255,255,0.75); }

        .typing {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            padding-top: 6px;
        }

        .typing span {
            width: 5px;
            height: 5px;
            background: var(--muted);
            border-radius: 50%;
            animation: blink 1.2s ease infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Input area */
        .input-area {
            padding: 18px 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        #chatInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.6;
            resize: none;
            min-height: 80px;
            max-height: 180px;
            overflow-y: auto;
            scrollbar-width: none;
            caret-color: var(--orange);
        }

        #chatInput::placeholder {
            color: var(--muted);
            opacity: 0.6;
        }

        #sendBtn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            border: none;
            border-radius: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(255,155,38,0.25);
            align-self: flex-end;
        }

        #sendBtn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255,155,38,0.35);
        }

        #sendBtn:active { transform: translateY(0); }

        #sendBtn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        #micBtn {
            width: 40px;
            height: 40px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            align-self: flex-end;
            color: var(--muted);
        }

        #micBtn:hover {
            border-color: rgba(255,155,38,0.3);
            background: rgba(255,155,38,0.06);
            color: var(--text);
        }

        #micBtn.listening {
            background: rgba(255,60,60,0.15);
            border-color: rgba(255,60,60,0.5);
            color: #ff4444;
            animation: micPulse 1.5s ease infinite;
        }

        @keyframes micPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,60,60,0.3); }
            50% { box-shadow: 0 0 0 8px rgba(255,60,60,0); }
        }

        #micBtn svg {
            width: 18px;
            height: 18px;
        }

        #sendBtn svg {
            width: 16px;
            height: 16px;
            color: white;
        }

        /* ── QUICK LINKS MARQUEE ── */
        .quick-links-wrapper {
            width: 100%;
            margin-top: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
            mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
            animation: fadeUp 0.7s 0.55s ease both;
        }

        .marquee-row {
            display: flex;
            gap: 10px;
            width: max-content;
            will-change: transform;
        }

        .quick-links-wrapper:hover .marquee-row {
            animation-play-state: paused !important;
        }

        .marquee-row.left {
            animation: scrollLeft 30s linear infinite;
        }

        .marquee-row.right {
            animation: scrollRight 34s linear infinite;
        }

        .marquee-row.left2 {
            animation: scrollLeft 26s linear infinite;
        }

        @keyframes scrollLeft {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes scrollRight {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }

        .quick-chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
            padding: 9px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.82rem;
            font-weight: 400;
            color: rgba(255,255,255,0.65);
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            user-select: none;
            position: relative;
            z-index: 10;
        }

        .quick-chip:hover {
            background: rgba(255,155,38,0.08);
            border-color: rgba(255,155,38,0.3);
            color: var(--text);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(255,155,38,0.12);
        }

        .quick-chip:active {
            transform: translateY(0);
        }

        .chip-icon {
            font-size: 13px;
            opacity: 0.8;
        }

        .quick-chip.category {
            background: linear-gradient(135deg, rgba(255,155,38,0.18), rgba(238,76,39,0.14));
            border-color: rgba(255,155,38,0.45);
            color: var(--orange);
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.02em;
            cursor: pointer;
            box-shadow: 0 0 14px rgba(255,155,38,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .quick-chip.category .chip-icon {
            opacity: 1;
        }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            padding: 24px 20px 20px;
            flex-shrink: 0;
            animation: fadeDown 0.6s 0.5s ease both;
        }

        .footer-socials {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .footer-socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            text-decoration: none;
            transition: all 0.2s;
        }

        .footer-socials a:hover {
            color: var(--text);
            border-color: rgba(255,155,38,0.3);
            background: rgba(255,155,38,0.06);
            transform: translateY(-2px);
        }

        .footer-socials a svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            nav { padding: 20px 24px; }
            .nav-links a { display: none; }
            .hero { padding: 16px 16px 0; }
            .hero-heading { font-size: 1.9rem; }
            .input-area { padding: 14px 16px 12px; }
            #chatInput { min-height: 60px; }
        }
    </style>
</head>
<body>

        <!-- Nav -->
        <nav>
            <div class="logo">
                <img src="/Logo /Vernon Tech And Media.png" alt="Vernon Tech & Media" />
            </div>
            <div class="nav-links">
                <a href="/contact.html">Contact Us</a>
                <a href="https://vernontm.com/book-call">Book a Call</a>
                <button class="hamburger" aria-label="Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>

        <!-- Hero -->
        <main class="hero">
            <img src="/icon_logo_vtm.png" alt="" class="hero-icon" />
            <h1 class="hero-heading">What do you need <em>help</em> with?</h1>

            <div class="eyebrow">
                <span class="eyebrow-dot"></span>
                Unlocking the Power of AI for Brands & Creators
            </div>
            <p class="hero-sub">Ask anything - websites, automation, AI, marketing, or scaling your business.</p>

            <!-- Chat Box -->
            <div class="chat-container">
                <div class="chat-box">
                    <div class="messages" id="messages"></div>

                    <div class="input-area">
                        <div class="input-row">
                            <textarea
                                id="chatInput"
                                rows="3"
                                placeholder="Describe what you're looking for…"
                            ></textarea>
                            <button id="micBtn" aria-label="Voice input" title="Speak your message">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="9" y="1" width="6" height="12" rx="3"></rect>
                                    <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
                                    <line x1="12" y1="19" x2="12" y2="23"></line>
                                    <line x1="8" y1="23" x2="16" y2="23"></line>
                                </svg>
                            </button>
                            <button id="sendBtn" aria-label="Send">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Animated Quick Links -->
                <div class="quick-links-wrapper" id="quickLinks">
                    <!-- Row 1 — scrolls left -->
                    <div class="marquee-row left" id="row1"></div>
                    <!-- Row 2 — scrolls right -->
                    <div class="marquee-row right" id="row2"></div>
                    <!-- Row 3 — scrolls left faster -->
                    <div class="marquee-row left2" id="row3"></div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer>
            <div class="footer-socials">
                <!-- Instagram -->
                <a href="https://instagram.com/rayvaughn.ceo" aria-label="Instagram" target="_blank">
                    <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                </a>
                <!-- TikTok -->
                <a href="https://tiktok.com/@rayvaughn.ceo" aria-label="TikTok" target="_blank">
                    <svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 00-.79-.05A6.34 6.34 0 003.15 15.2a6.34 6.34 0 0010.86 4.48V13a8.28 8.28 0 005.58 2.17v-3.44a4.85 4.85 0 01-3.77-1.82V6.69h3.77z"/></svg>
                </a>
                <!-- YouTube -->
                <a href="https://youtube.com/@vernontm" aria-label="YouTube" target="_blank">
                    <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                </a>
                <!-- X / Twitter -->
                <a href="https://x.com/rayvaughnceo" aria-label="X" target="_blank">
                    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </a>
            </div>
        </footer>
    </div>

    <script>
        // ── QUICK CHIPS DATA ──
        const chipRows = [
            [
                { icon: '📣', text: 'Marketing', category: true },
                { icon: '💻', text: 'I need a website built for my business' },
                { icon: '📱', text: 'I need a mobile app for my business' },
                { icon: '🌐', text: 'Web & App Development', category: true },
                { icon: '🤖', text: 'I need an AI chatbot for my website' },
                { icon: '📞', text: 'I need an AI calling agent to contact my leads' },
                { icon: '🚀', text: 'I need help growing my social media and brand' },
                { icon: '📲', text: 'Social Media', category: true },
            ],
            [
                { icon: '📊', text: 'Business Strategy', category: true },
                { icon: '📊', text: 'I need a full digital marketing strategy' },
                { icon: '🧭', text: "I don't know where to start with AI for my business" },
                { icon: '⚙️', text: 'Business Automation', category: true },
                { icon: '🔍', text: 'I want someone to audit what I have and tell me what to fix' },
                { icon: '🗺️', text: 'I need a roadmap to scale my business with AI' },
                { icon: '🤝', text: 'Consulting', category: true },
                { icon: '✍️', text: 'I need help with content creation and automation' },
            ],
            [
                { icon: '🤖', text: 'Business Automation', category: true },
                { icon: '⚙️', text: 'I want to automate repetitive tasks in my business' },
                { icon: '🎭', text: 'I want to build a faceless brand with AI avatars' },
                { icon: '📣', text: 'Marketing', category: true },
                { icon: '📧', text: 'I need automated email marketing set up' },
                { icon: '🏪', text: 'I need an e-commerce store built and automated' },
                { icon: '💡', text: 'I need help figuring out what AI tools I should use' },
                { icon: '🤝', text: 'Consulting', category: true },
            ],
        ];

        function buildRow(rowEl, chips) {
            const allChips = [...chips, ...chips];
            allChips.forEach(({ icon, text, category }) => {
                const chip = document.createElement('button');
                chip.className = category ? 'quick-chip category' : 'quick-chip';
                chip.innerHTML = `<span class="chip-icon">${icon}</span>${text}`;
                chip.dataset.chipText = category ? `I'm interested in ${text}` : text;
                rowEl.appendChild(chip);
            });
        }

        buildRow(document.getElementById('row1'), chipRows[0]);
        buildRow(document.getElementById('row2'), chipRows[1]);
        buildRow(document.getElementById('row3'), chipRows[2]);

        // Event delegation for chip clicks
        document.getElementById('quickLinks').addEventListener('pointerdown', (e) => {
            const chip = e.target.closest('.quick-chip[data-chip-text]');
            if (!chip) return;
            e.preventDefault();
            e.stopPropagation();
            const text = chip.dataset.chipText;
            if (text) fillAndSend(text);
        });

        // ── CHAT LOGIC ──
        const input = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesEl = document.getElementById('messages');

        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 180) + 'px';
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        // ── SPEECH-TO-TEXT (Web Speech API) ──
        const micBtn = document.getElementById('micBtn');
        let recognition = null;
        let isListening = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            function startListening() {
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US';

                recognition.onstart = () => {
                    isListening = true;
                    micBtn.classList.add('listening');
                    input.placeholder = 'Listening... tap mic to stop';
                };

                recognition.onresult = (event) => {
                    if (!isListening) return; // Ignore results after stop
                    let transcript = '';
                    for (let i = 0; i < event.results.length; i++) {
                        transcript += event.results[i][0].transcript;
                    }
                    input.value = transcript;
                    input.style.height = 'auto';
                    input.style.height = Math.min(input.scrollHeight, 180) + 'px';
                };

                recognition.onend = () => {
                    // Only clear state if user stopped it
                    if (!isListening) return;
                    // Auto-restart if still listening (Chrome kills after ~60s silence)
                    try { recognition.start(); } catch(e) {
                        isListening = false;
                        micBtn.classList.remove('listening');
                        input.placeholder = 'Describe what you\u2019re looking for\u2026';
                    }
                };

                recognition.onerror = (event) => {
                    if (event.error === 'no-speech' || event.error === 'aborted') return;
                    console.error('Speech error:', event.error);
                    isListening = false;
                    micBtn.classList.remove('listening');
                    input.placeholder = 'Describe what you\u2019re looking for\u2026';
                };

                recognition.start();
            }

            function stopListening() {
                isListening = false;
                if (recognition) {
                    try { recognition.stop(); } catch(e) {}
                }
                micBtn.classList.remove('listening');
                input.placeholder = 'Describe what you\u2019re looking for\u2026';
                input.focus();
            }

            micBtn.addEventListener('click', () => {
                if (isListening) {
                    stopListening();
                } else {
                    startListening();
                }
            });
        } else {
            micBtn.style.display = 'none';
        }

        function fillAndSend(text) {
            input.value = text;
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 180) + 'px';
            sendMessage();
        }

        const conversationHistory = [];

        function removeQuickReplies() {
            const existing = messagesEl.querySelector('.quick-replies');
            if (existing) existing.remove();
        }

        function parseQuickReplies(content) {
            // Strip hidden summary block
            let cleaned = content.replace(/\[SUMMARY\][\s\S]*/i, '').trim();
            const tagMatch = cleaned.match(/\[QUICK_REPLIES:([^\]]+)\]/);
            if (!tagMatch) return { text: cleaned, replies: [] };
            const text = cleaned.replace(/\[QUICK_REPLIES:[^\]]+\]/, '').trim();
            const replies = tagMatch[1].match(/"([^"]+)"/g);
            if (!replies) return { text, replies: [] };
            return { text, replies: replies.map(r => r.replace(/"/g, '')) };
        }

        function appendMessage(role, content) {
            messagesEl.classList.add('has-messages');
            removeQuickReplies();

            const isUser = role === 'user';
            let displayText = content;
            let quickReplies = [];
            let hasBookCall = false;

            if (!isUser) {
                const parsed = parseQuickReplies(content);
                displayText = parsed.text;
                quickReplies = parsed.replies;

                // Check for book-call link and strip it from text
                if (displayText.includes('vernontm.com/book-call')) {
                    hasBookCall = true;
                    displayText = displayText.replace(/https?:\/\/vernontm\.com\/book-call/g, '').replace(/\s{2,}/g, ' ').trim();
                }
            }

            const msg = document.createElement('div');
            msg.className = 'message';
            msg.innerHTML = `
                <div class="msg-avatar ${isUser ? 'user-av' : 'ai-av'}">${isUser ? 'U' : '✦'}</div>
                <div class="msg-body ${isUser ? 'user-msg' : 'ai-msg'}">${escapeHtml(displayText)}</div>
            `;
            messagesEl.appendChild(msg);

            if (hasBookCall) {
                const ctaLink = document.createElement('a');
                ctaLink.href = 'https://vernontm.com/book-call';
                ctaLink.target = '_blank';
                ctaLink.className = 'chat-cta-btn';
                ctaLink.textContent = 'Book a Call';
                messagesEl.appendChild(ctaLink);
            }

            if (quickReplies.length > 0) {
                const repliesDiv = document.createElement('div');
                repliesDiv.className = 'quick-replies';
                quickReplies.forEach(reply => {
                    const btn = document.createElement('button');
                    btn.className = 'quick-reply-btn';
                    btn.textContent = reply;
                    btn.addEventListener('click', () => {
                        removeQuickReplies();
                        input.value = reply;
                        sendMessage();
                    });
                    repliesDiv.appendChild(btn);
                });
                messagesEl.appendChild(repliesDiv);
            }

            // Scroll to top of this message so user reads from the beginning
            if (!isUser) {
                msg.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }
        }

        function appendTyping() {
            messagesEl.classList.add('has-messages');
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.id = 'typing-indicator';
            msg.innerHTML = `
                <div class="msg-avatar ai-av">✦</div>
                <div class="msg-body ai-msg"><div class="typing"><span></span><span></span><span></span></div></div>
            `;
            messagesEl.appendChild(msg);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('typing-indicator');
            if (t) t.remove();
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // Reset speech recognition for a fresh session
            if (isListening && recognition) {
                try { recognition.stop(); } catch(e) {}
                isListening = false;
                micBtn.classList.remove('listening');
                input.placeholder = 'Describe what you\'re looking for...';
            }

            // Hide quick links after first message
            document.getElementById('quickLinks').style.display = 'none';

            input.value = '';
            input.style.height = 'auto';
            appendMessage('user', text);
            conversationHistory.push({ role: 'user', content: text });

            sendBtn.disabled = true;
            appendTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                removeTyping();

                if (!response.ok) throw new Error(`Server error ${response.status}`);

                const data = await response.json();
                const reply = data.reply || "Sorry, I couldn't get a response. Please try again.";
                conversationHistory.push({ role: 'assistant', content: reply });
                appendMessage('assistant', reply);

            } catch (err) {
                removeTyping();
                appendMessage('assistant', 'Hmm, something went wrong. Check that the API is connected and try again.');
                console.error(err);
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
