<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Client Portal · Vernon Tech &amp; Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#f3f4f6;--panel:#fff;--ink:#1a1d21;--body:#4b5563;--muted:#6b7280;--line:#e5e7eb;--line2:#dcdfe4;--accent:#2563eb;--accent-tint:#eef3ff;--ok:#16a34a;--ok-tint:#e9f7ef;--warn:#d97706;--warn-tint:#fef4e6;--red:#dc2626;--red-tint:#fdecec;--side-bg:#171a1f;--side-text:rgba(255,255,255,0.92);--side-muted:rgba(255,255,255,0.55);--side-border:rgba(255,255,255,0.08);--side-hover:rgba(255,255,255,0.06);--fdisp:'Plus Jakarta Sans',system-ui,sans-serif;--fbody:'DM Sans',system-ui,sans-serif}
    *{box-sizing:border-box;margin:0;padding:0} html,body{height:100%}
    body{background:var(--bg);color:var(--body);font-family:var(--fbody);-webkit-font-smoothing:antialiased}
    button{font-family:inherit;cursor:pointer}
    a{color:var(--accent);text-decoration:none}
    /* Auth screens */
    .authwrap{max-width:420px;margin:0 auto;padding:70px 22px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px}
    h1{font-family:var(--fdisp);font-weight:800;color:var(--ink)}
    .sub{color:var(--muted);font-size:14.5px;margin-top:6px}
    label.fl{display:block;font-size:12.5px;color:var(--body);font-weight:600;margin:14px 0 6px}
    input.inp,select.inp,textarea.inp{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14.5px;color:var(--ink);font-family:inherit;background:#fff}
    input.inp:focus,select.inp:focus,textarea.inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .btn{background:var(--ink);color:#fff;border:none;border-radius:10px;padding:12px 16px;font-size:14px;font-weight:700}
    .btn.block{width:100%;margin-top:16px}
    .btn.pri{background:var(--accent)} .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line2)}
    .btn:disabled{opacity:.5;cursor:default}
    .err{color:var(--red);font-size:13px;margin-top:12px}
    /* Layout */
    .layout{display:flex;min-height:100vh}
    .sidebar{width:236px;background:var(--side-bg);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
    .brand{font-family:var(--fdisp);font-weight:800;font-size:12px;letter-spacing:.13em;padding:22px 20px 18px}
    .brand .b1{color:#fff} .brand .b2{color:var(--side-muted);display:block;font-size:10.5px;letter-spacing:.16em;margin-top:3px}
    .nav{flex:1;padding:6px 8px;display:flex;flex-direction:column;gap:1px}
    .nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:1px solid transparent;margin:1px 0;padding:9px 14px;border-radius:10px;font-size:13px;font-weight:400;font-family:var(--fdisp);color:var(--side-text)}
    .nav button .ic{width:17px;height:17px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;opacity:.85}
    .nav button:hover{background:var(--side-hover);color:#fff}
    .nav button.on{background:rgba(37,99,235,0.14);box-shadow:inset 0 0 0 1px rgba(37,99,235,0.4);color:#60a5fa;font-weight:500}
    .nav .badge-n{margin-left:auto;font-size:10.5px;font-weight:800;background:var(--red);color:#fff;border-radius:999px;padding:1px 7px}
    .side-foot{padding:12px;border-top:1px solid var(--side-border)}
    .signout{width:100%;font-size:13px;color:var(--side-muted);border:1px solid var(--side-border);border-radius:9px;padding:9px;font-weight:500;background:transparent}
    .signout:hover{color:#fff;background:var(--side-hover)}
    .main{flex:1;min-width:0;padding:30px 34px 80px;max-width:960px}
    .ph{font-family:var(--fdisp);font-weight:800;font-size:23px;color:var(--ink)} .psub{color:var(--muted);font-size:14px;margin-top:5px;margin-bottom:22px}
    .sec{font-family:var(--fdisp);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:26px 0 12px}
    .grid{display:grid;gap:14px}
    .g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)}
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px 18px}
    .stat .k{font-size:12px;color:var(--muted);font-weight:600} .stat .v{font-family:var(--fdisp);font-weight:800;font-size:22px;color:var(--ink);margin-top:6px}
    .stat .vsub{font-size:12px;color:var(--muted);margin-top:2px}
    .bar{height:8px;background:var(--bg);border-radius:999px;overflow:hidden;margin-top:12px} .bar>i{display:block;height:100%;background:var(--accent);border-radius:999px}
    .task{display:flex;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:9px;cursor:pointer;align-items:flex-start}
    .task.done{opacity:.6}.task.done .ttl{text-decoration:line-through}
    .chk{width:21px;height:21px;border-radius:50%;border:2px solid var(--line2);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
    .task.done .chk{background:var(--ok);border-color:var(--ok)} .chk svg{width:11px;height:11px;stroke:#fff;stroke-width:3.4;fill:none;opacity:0}.task.done .chk svg{opacity:1}
    .ttl{font-weight:600;font-size:14px;color:var(--ink)} .tdesc{color:var(--muted);font-size:12.5px;margin-top:3px;line-height:1.5}
    .row{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-bottom:9px}
    .rowflex{display:flex;align-items:center;gap:10px}
    .badge{font-size:11px;font-weight:700;border-radius:999px;padding:2px 10px;text-transform:capitalize;white-space:nowrap}
    .badge.needed,.badge.pending{color:var(--warn);background:var(--warn-tint);border:1px solid #f4d9ac}
    .badge.requested{color:var(--accent);background:var(--accent-tint);border:1px solid #cfe0ff}
    .badge.granted,.badge.paid,.badge.signed,.badge.done{color:var(--ok);background:var(--ok-tint);border:1px solid #bfe6cf}
    .pproc{margin-top:9px;background:var(--bg);border-radius:8px;padding:9px 11px;font-size:12.5px;color:var(--body);white-space:pre-wrap;line-height:1.55}
    .muted{color:var(--muted);font-size:13px}
    .paytbl{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
    .paytbl .pr{display:flex;align-items:center;gap:12px;padding:13px 16px;border-top:1px solid var(--line)}
    .paytbl .pr:first-child{border-top:none}
    .paytbl .pl{flex:1;min-width:0} .paytbl .pname{font-weight:600;color:var(--ink);font-size:14px} .paytbl .pcond{color:var(--muted);font-size:12px;margin-top:2px}
    .paytbl .pamt{font-weight:800;color:var(--ink);font-family:var(--fdisp)}
    .state{text-align:center;padding:60px 20px;color:var(--muted)}.state h2{font-family:var(--fdisp);color:var(--ink);font-size:19px;margin-bottom:8px}
    .cred{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:9px}
    .credhd{display:flex;align-items:center;gap:10px}.credname{font-weight:700;color:var(--ink);font-size:14px;flex:1}
    .del{background:none;border:none;color:var(--red);font-size:12px;font-weight:600}
    .formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .savebar{display:flex;gap:10px;margin-top:16px;align-items:center}
    .ok{color:var(--ok);font-size:13px;font-weight:600}
    .topbar{display:none}
    @media(max-width:820px){
      .sidebar{display:none}
      .layout{flex-direction:column}
      .topbar{display:flex;align-items:center;gap:10px;overflow-x:auto;background:var(--panel);border-bottom:1px solid var(--line);padding:10px 14px;position:sticky;top:0;z-index:10}
      .topbar button{white-space:nowrap;background:none;border:none;font-size:13.5px;font-weight:700;color:var(--muted);padding:7px 10px;border-radius:8px}
      .topbar button.on{background:var(--accent-tint);color:var(--accent)}
      .topbar .so{margin-left:auto;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-weight:600}
      .main{padding:20px 16px 70px}
      .g3,.g2,.formgrid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div id="app"><div class="state">Loading…</div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    // Capture the recovery flag BEFORE supabase-js parses & clears the URL hash,
    // so we always show the set-password screen (and never auto-load the portal)
    // when the client arrives from a set-password / recovery link.
    const WAS_RECOVERY = /type=recovery/.test(window.location.hash) || /type=recovery/.test(window.location.search);
    const SB_URL='https://ssllepovajmohdhvhzsa.supabase.co';
    const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzbGxlcG92YWptb2hkaHZoenNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTYwMTcsImV4cCI6MjA5MTA3MjAxN30.qFTsGzZsN5XVX_xgxpdclWmeEtCs1ZfmmLzOsmcN_0k';
    const sb=window.supabase.createClient(SB_URL,SB_ANON);
    const app=document.getElementById('app');
    const esc=s=>(s==null?'':String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])));
    const money=n=>'$'+(Number(n||0)).toLocaleString('en-US',{maximumFractionDigits:0});
    const CHK='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
    const ICONS={dashboard:'<path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>',onboarding:'<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',info:'<circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/>',docs:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>',pay:'<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>'};
    let recovering=false, data=null, view='dashboard';

    sb.auth.onAuthStateChange((event)=>{ if(event==='PASSWORD_RECOVERY'){recovering=true;renderSetPassword();} });

    async function boot(){
      if(WAS_RECOVERY || recovering){ renderSetPassword(); return; }
      const {data:{session}}=await sb.auth.getSession();
      if(session){loadPortal();} else {renderLogin();}
    }
    function renderLogin(){
      app.innerHTML='<div class="authwrap"><h1>Client login</h1><div class="sub">Sign in to your Vernon Tech &amp; Media portal.</div>'
        +'<div class="card" style="margin-top:20px"><label class="fl">Email</label><input class="inp" id="em" type="email" placeholder="you@business.com" />'
        +'<label class="fl">Password</label><input class="inp" id="pw" type="password" placeholder="Your password" />'
        +'<button class="btn pri block" id="go">Log in</button><div class="err" id="er"></div></div></div>';
      document.getElementById('go').onclick=async()=>{
        const er=document.getElementById('er');er.textContent='';
        const {error}=await sb.auth.signInWithPassword({email:document.getElementById('em').value.trim(),password:document.getElementById('pw').value});
        if(error){er.textContent=error.message;return;} loadPortal();
      };
    }
    function renderSetPassword(){
      app.innerHTML='<div class="authwrap"><h1>Set your password</h1><div class="sub">Create a password to access your portal.</div>'
        +'<div class="card" style="margin-top:20px"><label class="fl">New password</label><input class="inp" id="pw" type="password" placeholder="At least 8 characters" />'
        +'<button class="btn pri block" id="go">Save password</button><div class="err" id="er"></div></div></div>';
      document.getElementById('go').onclick=async()=>{
        const er=document.getElementById('er');er.textContent='';
        const pw=document.getElementById('pw').value; if(pw.length<8){er.textContent='Use at least 8 characters.';return;}
        const {error}=await sb.auth.updateUser({password:pw});
        if(error){er.textContent=error.message;return;} recovering=false; loadPortal();
      };
    }
    async function api(path,opts={}){
      const {data:{session}}=await sb.auth.getSession();
      const r=await fetch('/api/crm'+path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+(session?.access_token||''),...(opts.headers||{})}});
      if(!r.ok)throw new Error((await r.json().catch(()=>({}))).error||'error');
      return r.json();
    }
    async function loadPortal(){
      app.innerHTML='<div class="state">Loading your portal…</div>';
      try{ data=await api('/portal-auth'); shell(); }
      catch(e){ app.innerHTML='<div class="state"><h2>No workspace yet</h2><p>'+esc(e.message)+'</p><p style="margin-top:14px"><a href="#" id="lo">Sign out</a></p></div>'; const lo=document.getElementById('lo'); if(lo)lo.onclick=signOut; }
    }
    async function signOut(e){ if(e)e.preventDefault(); await sb.auth.signOut(); location.href='/client'; }

    const NAV=[['dashboard','Dashboard'],['onboarding','Onboarding'],['info','My Info'],['docs','Documents'],['pay','Payments']];
    function urgentCount(){ return (data.tasks||[]).filter(t=>t.status!=='done').length; }

    function shell(){
      const c=data.client, first=(c.owner_name||'').split(' ')[0]||'there', urg=urgentCount();
      const navBtns=NAV.map(([k,l])=>'<button class="'+(view===k?'on':'')+'" data-v="'+k+'"><svg class="ic" viewBox="0 0 24 24">'+ICONS[k]+'</svg>'+l+(k==='onboarding'&&urg?'<span class="badge-n">'+urg+'</span>':'')+'</button>').join('');
      const topBtns=NAV.map(([k,l])=>'<button class="'+(view===k?'on':'')+'" data-v="'+k+'">'+l+'</button>').join('');
      app.innerHTML='<div class="layout">'
        +'<aside class="sidebar"><div class="brand"><span class="b1">VERNON TECH &amp; MEDIA</span><span class="b2">CLIENT PORTAL</span></div><nav class="nav">'+navBtns+'</nav><div class="side-foot"><button class="signout" id="so">Sign out</button></div></aside>'
        +'<div class="topbar">'+topBtns+'<button class="so" id="so2">Sign out</button></div>'
        +'<main class="main" id="main"></main></div>';
      app.querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{view=b.dataset.v;shell();});
      const so=document.getElementById('so'), so2=document.getElementById('so2'); if(so)so.onclick=signOut; if(so2)so2.onclick=signOut;
      renderView();
    }

    function renderView(){
      const m=document.getElementById('main');
      if(view==='dashboard')m.innerHTML=vDashboard();
      else if(view==='onboarding')m.innerHTML=vOnboarding();
      else if(view==='info')m.innerHTML=vInfo();
      else if(view==='docs')m.innerHTML=vDocs();
      else if(view==='pay')m.innerHTML=vPay();
      wire();
    }

    function taskHtml(t){return '<div class="task '+(t.status==='done'?'done':'')+'" data-id="'+t.id+'"><div class="chk">'+CHK+'</div><div><div class="ttl">'+esc(t.title)+'</div>'+(t.description?'<div class="tdesc">'+esc(t.description)+'</div>':'')+'</div></div>';}

    function vDashboard(){
      const c=data.client, s=data.summary||{}, tasks=data.tasks||[], first=(c.owner_name||'').split(' ')[0]||'there';
      const done=tasks.filter(t=>t.status==='done').length, urg=tasks.filter(t=>t.status!=='done');
      const pct=s.total?Math.round((s.paid/s.total)*100):0;
      const stageLabel={lead:'New',onboarding:'Onboarding',awaiting_access:'Awaiting access',scoping:'Scoping',plan_review:'Plan review',in_build:'In progress',live:'Live',paused:'Paused'}[c.stage]||(c.stage||'—');
      let h='<div class="ph">Welcome, '+esc(first)+'</div><div class="psub">Here\'s where '+esc(c.business_name)+' stands with Vernon Tech &amp; Media.</div>';
      h+='<div class="grid g3">';
      h+='<div class="stat"><div class="k">Project status</div><div class="v" style="font-size:18px">'+esc(stageLabel)+'</div></div>';
      h+='<div class="stat"><div class="k">Balance remaining</div><div class="v">'+money(s.remaining)+'</div><div class="vsub">of '+money(s.total)+' · '+(s.remaining_count||0)+' payment'+((s.remaining_count||0)===1?'':'s')+' left</div><div class="bar"><i style="width:'+pct+'%"></i></div></div>';
      h+='<div class="stat"><div class="k">Onboarding</div><div class="v">'+done+'/'+tasks.length+'</div><div class="vsub">steps completed</div></div>';
      h+='</div>';
      h+='<div class="sec">Your next steps</div>';
      if(urg.length){ urg.slice(0,5).forEach(t=>h+=taskHtml(t)); if(urg.length>5)h+='<div class="muted" style="margin-top:6px"><a href="#" data-go="onboarding">See all '+urg.length+' steps →</a></div>'; }
      else h+='<div class="row muted">All caught up — nothing needed from you right now. 🎉</div>';
      if(s.next){ h+='<div class="sec">Next payment</div><div class="paytbl"><div class="pr"><div class="pl"><div class="pname">'+esc(s.next.label||'Payment')+'</div>'+(s.next.due_condition?'<div class="pcond">'+esc(s.next.due_condition)+'</div>':'')+'</div><div class="pamt">'+money(s.next.amount)+'</div><button class="btn pri" data-pay="'+s.next.id+'">Pay now</button></div></div>'; }
      return h;
    }

    function vOnboarding(){
      const tasks=data.tasks||[], plats=data.platforms||[], done=tasks.filter(t=>t.status==='done').length;
      let h='<div class="ph">Onboarding</div><div class="psub">Work through these so we can get your build moving.</div>';
      if(tasks.length){ h+='<div class="sec">Checklist · '+done+' of '+tasks.length+' done</div>'; tasks.forEach(t=>h+=taskHtml(t)); }
      if(plats.length){ h+='<div class="sec">Access status</div>'; plats.forEach(p=>{const st=['needed','requested','granted'].includes(p.access_status)?p.access_status:'needed';h+='<div class="row"><div class="rowflex"><span class="credname">'+esc(p.platform_name)+'</span><span class="badge '+st+'">'+st+'</span></div>'+(p.access_process?'<div class="pproc">'+esc(p.access_process)+'</div>':'')+'</div>';}); }
      if(!tasks.length&&!plats.length)h+='<div class="state"><h2>Nothing here yet</h2><p>We\'ll add steps as we go.</p></div>';
      return h;
    }

    function vInfo(){
      const c=data.client, creds=data.credentials||[];
      let h='<div class="ph">My Info</div><div class="psub">Add your accounts and the logins we need. Everything is stored securely.</div>';
      h+='<div class="sec">Social &amp; website</div><div class="card">'
        +'<div class="formgrid">'
        +fld('Website','website_url',c.website_url,'https://…')
        +fld('Instagram','instagram',c.instagram,'@handle')
        +fld('TikTok','tiktok',c.tiktok,'@handle')
        +fld('Facebook','facebook',c.facebook,'facebook.com/…')
        +fld('YouTube','youtube',c.youtube,'channel URL')
        +fld('LinkedIn','linkedin',c.linkedin,'linkedin.com/…')
        +'</div><div class="savebar"><button class="btn pri" id="saveProfile">Save</button><span class="ok" id="profileOk" style="display:none">Saved ✓</span></div></div>';
      h+='<div class="sec">Access &amp; logins</div>';
      h+='<div class="psub" style="margin-top:-4px">Website hosting, Google Workspace, or any tool we need in. Add each below.</div>';
      if(creds.length){ creds.forEach(cr=>{ h+='<div class="cred"><div class="credhd"><span class="credname">'+esc(cr.label)+'</span><span class="badge granted">saved</span><button class="del" data-del="'+cr.id+'">Remove</button></div><div class="muted" style="margin-top:5px">'+[cr.category,cr.username,cr.url].filter(Boolean).map(esc).join(' · ')+(cr.has_secret?' · password saved':'')+'</div>'+(cr.notes?'<div class="pproc">'+esc(cr.notes)+'</div>':'')+'</div>'; }); }
      h+='<div class="card" style="margin-top:6px"><div class="ttl" style="margin-bottom:4px">Add access</div>'
        +'<div class="formgrid">'
        +'<div><label class="fl">What is it?</label><input class="inp" id="cl" placeholder="e.g. Website hosting (GoDaddy)" /></div>'
        +'<div><label class="fl">Category</label><select class="inp" id="cc"><option value="hosting">Website / hosting</option><option value="workspace">Google Workspace / email</option><option value="social">Social account</option><option value="domain">Domain / DNS</option><option value="stripe">Stripe / payments</option><option value="other">Other</option></select></div>'
        +'<div><label class="fl">Login email / username</label><input class="inp" id="cu" placeholder="you@business.com" /></div>'
        +'<div><label class="fl">URL</label><input class="inp" id="curl" placeholder="https://…" /></div>'
        +'<div><label class="fl">Password (optional)</label><input class="inp" id="cs" type="password" placeholder="stored encrypted" /></div>'
        +'<div><label class="fl">Notes</label><input class="inp" id="cn" placeholder="anything we should know" /></div>'
        +'</div><div class="savebar"><button class="btn pri" id="addCred">Add access</button><span class="err" id="credEr"></span></div></div>';
      return h;
    }
    function fld(label,id,val,ph){return '<div><label class="fl">'+label+'</label><input class="inp" data-f="'+id+'" value="'+esc(val||'')+'" placeholder="'+ph+'" /></div>';}

    function vDocs(){
      const docs=data.documents||[];
      let h='<div class="ph">Documents</div><div class="psub">Your signed agreement and related documents.</div>';
      if(!docs.length)return h+'<div class="state"><h2>No documents yet</h2><p>Your signed agreement will appear here.</p></div>';
      docs.forEach(d=>{
        h+='<div class="row"><div class="rowflex"><span class="credname">'+esc(d.title)+'</span><span class="badge '+(d.status||'signed')+'">'+esc(d.status||'signed')+'</span></div>'
          +'<div class="muted" style="margin-top:6px">'+(d.signed_at?'Signed '+new Date(d.signed_at).toLocaleDateString():'Awaiting signature')+(d.has_nda?' · includes Mutual NDA':'')+'</div>'
          +(d.url?'<div style="margin-top:12px"><a class="btn ghost" href="'+d.url+'" target="_blank" rel="noopener">Download PDF</a></div>':'<div class="muted" style="margin-top:10px">The signed copy will be available here shortly after signing.</div>')
          +'</div>';
      });
      return h;
    }

    function vPay(){
      const s=data.summary||{}, pays=data.payments||[], pct=s.total?Math.round((s.paid/s.total)*100):0;
      let h='<div class="ph">Payments</div><div class="psub">Your balance and payment schedule.</div>';
      h+='<div class="grid g3"><div class="stat"><div class="k">Paid so far</div><div class="v">'+money(s.paid)+'</div></div>'
        +'<div class="stat"><div class="k">Remaining</div><div class="v">'+money(s.remaining)+'</div><div class="bar"><i style="width:'+pct+'%"></i></div></div>'
        +'<div class="stat"><div class="k">Payments left</div><div class="v">'+(s.remaining_count||0)+'</div></div></div>';
      if(s.remaining>0){ h+='<div class="savebar" style="margin-top:16px">'+(s.next?'<button class="btn pri" data-pay="'+s.next.id+'">Make next payment · '+money(s.next.amount)+'</button>':'')+'<button class="btn ghost" data-payall="1">Pay off balance · '+money(s.remaining)+'</button></div>'; }
      h+='<div class="sec">Schedule</div>';
      if(!pays.length)h+='<div class="row muted">No payments on file yet.</div>';
      else{ h+='<div class="paytbl">'; pays.forEach(p=>{ const st=p.status==='paid'?'paid':'pending'; h+='<div class="pr"><div class="pl"><div class="pname">'+esc(p.label||'Payment')+'</div><div class="pcond">'+esc(p.due_condition||'')+(p.paid_at?' · paid '+new Date(p.paid_at).toLocaleDateString():'')+'</div></div><div class="pamt">'+money(p.amount)+'</div><span class="badge '+st+'">'+st+'</span>'+(p.status!=='paid'?'<button class="btn pri" data-pay="'+p.id+'">Pay</button>':'')+'</div>'; }); h+='</div>'; }
      return h;
    }

    function wire(){
      const m=document.getElementById('main');
      m.querySelectorAll('.task').forEach(el=>el.onclick=()=>toggle(el.dataset.id));
      m.querySelectorAll('[data-go]').forEach(el=>el.onclick=e=>{e.preventDefault();view=el.dataset.go;shell();});
      m.querySelectorAll('[data-pay]').forEach(el=>el.onclick=()=>pay({payment_id:el.dataset.pay},el));
      m.querySelectorAll('[data-payall]').forEach(el=>el.onclick=()=>pay({all:true},el));
      m.querySelectorAll('[data-del]').forEach(el=>el.onclick=()=>delCred(el.dataset.del));
      const sp=document.getElementById('saveProfile'); if(sp)sp.onclick=saveProfile;
      const ac=document.getElementById('addCred'); if(ac)ac.onclick=addCred;
    }
    async function toggle(id){
      const t=data.tasks.find(x=>x.id===id);if(!t)return;
      const next=t.status==='done'?'todo':'done'; t.status=next; renderView();
      try{ await api('/portal-auth?task_id='+id,{method:'PATCH',body:JSON.stringify({status:next})}); }
      catch(e){ t.status=next==='done'?'todo':'done'; renderView(); }
    }
    async function saveProfile(){
      const btn=document.getElementById('saveProfile'), ok=document.getElementById('profileOk'); btn.disabled=true;
      const body={}; document.querySelectorAll('[data-f]').forEach(i=>body[i.dataset.f]=i.value.trim());
      try{ await api('/portal-auth?action=save-profile',{method:'POST',body:JSON.stringify(body)}); Object.assign(data.client,body); ok.style.display=''; setTimeout(()=>ok.style.display='none',2200); }
      catch(e){ alert(e.message); } finally{ btn.disabled=false; }
    }
    async function addCred(){
      const er=document.getElementById('credEr'); er.textContent='';
      const label=document.getElementById('cl').value.trim(); if(!label){er.textContent='Add a name.';return;}
      const body={label,category:document.getElementById('cc').value,username:document.getElementById('cu').value.trim(),url:document.getElementById('curl').value.trim(),secret:document.getElementById('cs').value,notes:document.getElementById('cn').value.trim()};
      const btn=document.getElementById('addCred'); btn.disabled=true;
      try{ await api('/portal-auth?action=add-credential',{method:'POST',body:JSON.stringify(body)}); data=await api('/portal-auth'); renderView(); }
      catch(e){ er.textContent=e.message; btn.disabled=false; }
    }
    async function delCred(id){
      if(!confirm('Remove this access entry?'))return;
      try{ await api('/portal-auth?action=delete-credential&cred_id='+id,{method:'POST'}); data.credentials=(data.credentials||[]).filter(c=>c.id!==id); renderView(); }
      catch(e){ alert(e.message); }
    }
    async function pay(bodyObj,btn){
      if(btn){btn.disabled=true;btn.textContent='…';}
      try{ const r=await api('/portal-auth?action=pay',{method:'POST',body:JSON.stringify(bodyObj)}); if(r.url)location.href=r.url; }
      catch(e){ alert(e.message); if(btn)btn.disabled=false; }
    }

    boot();
  </script>
</body>
</html>
