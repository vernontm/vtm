<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Sign · Vernon Tech &amp; Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js"></script>
  <style>
    :root{--bg:#eef0f3;--panel:#fff;--ink:#16191d;--body:#4b5563;--muted:#939aa6;--line:#e3e5ea;--line2:#cfd3da;--accent:#ee6a1f;--accent-tint:#fff4ec;--ok:#1f9d63;--ok-tint:#e9f7ef;--fdisp:'Plus Jakarta Sans',system-ui,sans-serif;--fbody:'Inter',system-ui,sans-serif;}
    *{box-sizing:border-box;margin:0;padding:0} body{background:var(--bg);color:var(--body);font-family:var(--fbody);-webkit-font-smoothing:antialiased}
    button{font-family:inherit;cursor:pointer}
    header.nav{background:var(--panel);border-bottom:1px solid var(--line);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:20}
    .brand{font-family:var(--fdisp);font-weight:800;font-size:12.5px;letter-spacing:.14em}
    .brand .b1{color:var(--accent)} .brand .b2{color:var(--muted);letter-spacing:.16em}
    .step-pill{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-tint);border:1px solid #f6c9a6;border-radius:999px;padding:4px 12px}
    .wrap{max-width:840px;margin:0 auto;padding:28px 20px 160px}
    .lead{margin-bottom:16px}
    .lead h1{font-family:var(--fdisp);font-weight:800;font-size:24px;color:var(--ink)}
    .lead p{color:var(--muted);font-size:14.5px;margin-top:6px}

    /* paper / document */
    .paper{background:#fff;border:1px solid var(--line);border-radius:10px;padding:46px 52px;font-family:Georgia,'Times New Roman',serif;color:#1a1a1a;line-height:1.55;font-size:14px;box-shadow:0 6px 30px rgba(0,0,0,.06)}
    .paper .doctitle{text-align:center;font-size:20px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;margin-bottom:2px}
    .paper .docsub{text-align:center;font-style:italic;color:#555;margin-bottom:22px}
    .paper h2{font-size:14.5px;font-weight:700;color:#1c3f63;margin:20px 0 6px}
    .paper p{margin:0 0 10px} .paper ul{margin:0 0 10px 22px} .paper li{margin:2px 0}
    .paper strong{font-weight:700}
    .sigblock{display:flex;gap:44px;margin-top:38px;flex-wrap:wrap}
    .party{flex:1;min-width:230px}
    .sigline{min-height:48px;border-bottom:1px solid #333;display:flex;align-items:flex-end;font-family:'Dancing Script',cursive;font-size:31px;color:#16324a;padding-bottom:2px;line-height:1}
    .sigline img{height:46px}
    .sigline.empty{color:#c9ced6;font-size:13px;font-family:var(--fbody);font-style:italic}
    .sublabel{font-size:12px;color:#444;margin-top:5px}

    .startbtn{display:block;width:100%;margin-top:18px;background:var(--ink);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700}
    .startbtn.pulse{box-shadow:0 0 0 0 rgba(238,106,31,.5);animation:pulse 2s infinite}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(238,106,31,.45)}70%{box-shadow:0 0 0 14px rgba(238,106,31,0)}100%{box-shadow:0 0 0 0 rgba(238,106,31,0)}}

    .signcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin-top:22px}
    .signcard h2{font-family:var(--fdisp);font-size:17px;font-weight:800;color:var(--ink);margin-bottom:4px}
    .signcard .sub{color:var(--muted);font-size:13px}
    .moderow{display:flex;gap:10px;margin:14px 0}
    .mode{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:10px;font-weight:600;color:var(--ink);font-size:13.5px}
    .mode.on{border-color:var(--accent);background:var(--accent-tint);color:var(--accent)}
    canvas{width:100%;height:150px;border:1.5px dashed var(--line2);border-radius:10px;background:#fff;touch-action:none;display:block}
    .typed{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px 16px;font-family:'Dancing Script',cursive;font-size:32px;color:var(--ink);text-align:center}
    .typed:focus{outline:none;border-color:var(--accent)}
    .clearbtn{background:none;border:none;color:var(--muted);font-size:12.5px;font-weight:600;margin-top:8px}
    .agree{display:flex;gap:10px;align-items:flex-start;margin:16px 0;font-size:13px;color:var(--body);line-height:1.5}
    .submit{width:100%;background:var(--ink);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;margin-top:4px}
    .submit:disabled{background:#cbd0d8;cursor:not-allowed}
    .meta{font-size:11.5px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.6}

    .state{text-align:center;padding:80px 20px;color:var(--muted)}
    .state h2{font-family:var(--fdisp);color:var(--ink);font-size:22px;margin-bottom:8px}
    .badge{width:64px;height:64px;border-radius:50%;background:var(--ok-tint);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px}
    .offscreen{position:fixed;left:-99999px;top:0;width:800px}
  </style>
</head>
<body>
  <header class="nav">
    <div class="brand"><span class="b1">VERNON TECH &amp; MEDIA</span> <span class="b2">· AGREEMENT</span></div>
    <span class="step-pill" id="steppill"></span>
  </header>
  <main class="wrap" id="app"><div class="state">Loading your agreement…</div></main>
  <div class="offscreen" id="pdfroot"></div>

  <script>
    const token = new URLSearchParams(location.search).get('token');
    const app = document.getElementById('app');
    const pill = document.getElementById('steppill');
    const esc = s => (s==null?'':String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])));
    const today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

    let data=null;
    let step='agreement';                 // agreement -> nda
    let mode='type', drawn=false, ctx=null, last=null;
    const sigs = { agreement:null, nda:null };  // {method, value, name}

    // ── tiny markdown -> document HTML ─────────────────────────────
    function inline(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\_(.+?)\_/g,'<em>$1</em>'); }
    function mdToHtml(md){
      const lines=(md||'').split('\n'); let html=''; let inList=false; let firstH1=true;
      const closeList=()=>{ if(inList){html+='</ul>';inList=false;} };
      for(let raw of lines){
        const line=raw.trimEnd();
        if(!line.trim()){ closeList(); continue; }
        if(line.startsWith('# ')){ closeList(); if(firstH1){ html+='<div class="doctitle">'+inline(line.slice(2))+'</div>'; firstH1=false; } else html+='<h2>'+inline(line.slice(2))+'</h2>'; continue; }
        if(line.startsWith('## ')){ closeList(); html+='<h2>'+inline(line.slice(3))+'</h2>'; continue; }
        if(line.startsWith('- ')){ if(!inList){html+='<ul>';inList=true;} html+='<li>'+inline(line.slice(2))+'</li>'; continue; }
        // a lone bold line right after the title reads as subtitle
        if(!firstH1 && /^\*\*.+\*\*$/.test(line) && html.endsWith('</div>')){ html+='<div class="docsub">'+inline(line)+'</div>'; continue; }
        closeList(); html+='<p>'+inline(line)+'</p>';
      }
      closeList(); return html;
    }

    function sigLineHtml(sig){
      if(!sig) return '<div class="sigline empty">Sign here</div>';
      if(sig.method==='draw') return '<div class="sigline"><img src="'+sig.value+'" alt="signature"/></div>';
      return '<div class="sigline">'+esc(sig.value)+'</div>';
    }
    // Full document (paper) for a given doc key, with signature block.
    function paperHtml(docKey){
      const md = docKey==='nda' ? data.nda_markdown : data.agreement_markdown;
      const sig = sigs[docKey];
      return '<div class="paper">'+mdToHtml(md)
        + '<div class="sigblock">'
        +   '<div class="party"><div class="sigline">Rayvaughn Vernon</div><div class="sublabel">Rayvaughn Vernon &middot; Vernon Tech &amp; Media</div><div class="sublabel">Date: '+today+'</div></div>'
        +   '<div class="party">'+sigLineHtml(sig)+'<div class="sublabel">'+esc(data.owner_name||'Client')+' &middot; Client</div><div class="sublabel">Date: '+(sig?today:'____________')+'</div></div>'
        + '</div></div>';
    }

    // ── render current step ───────────────────────────────────────
    function render(){
      const hasNda=!!data.nda_markdown;
      const stepNum = step==='agreement'?1:2, total=hasNda?2:1;
      pill.textContent='Step '+stepNum+' of '+total;
      const title = step==='nda' ? 'Non-Disclosure Agreement' : 'Service Agreement';
      const nextLabel = step==='agreement' && hasNda ? 'Next: NDA →' : 'Finish &amp; Send';

      app.innerHTML =
        '<div class="lead"><h1>'+title+'</h1><p>Read it through, then sign on the signature line below.</p></div>'
        + '<div id="paper">'+paperHtml(step)+'</div>'
        + '<button class="startbtn pulse" id="start">Start signing ↓</button>'
        + '<div class="signcard" id="signcard" style="display:none">'
        +   '<h2>Your signature</h2><div class="sub">Type your name or draw it. It drops onto the '+ (step==='nda'?'NDA':'agreement') +' above.</div>'
        +   '<div class="moderow"><button class="mode'+(mode==='type'?' on':'')+'" data-m="type">Type</button><button class="mode'+(mode==='draw'?' on':'')+'" data-m="draw">Draw</button></div>'
        +   (mode==='draw' ? '<canvas id="pad"></canvas><button class="clearbtn" id="clr">Clear</button>'
                           : '<input class="typed" id="typed" placeholder="Your full name" value="'+esc(sigs[step]?.value || data.owner_name||'')+'" />')
        +   '<label class="agree"><input type="checkbox" id="ack" '+(sigs[step]?'checked':'')+' /> <span>I agree that signing electronically is legally binding, and I authorize the payment terms in this agreement. I will contact Vernon Tech &amp; Media directly to resolve any billing question before disputing a charge.</span></label>'
        +   '<button class="submit" id="go">'+nextLabel+'</button>'
        +   '<div class="meta">Signed electronically. Your name, IP address, and a timestamp are recorded for verification.</div>'
        + '</div>';

      document.getElementById('start').onclick=()=>{ document.getElementById('signcard').style.display='block'; document.getElementById('start').style.display='none'; document.getElementById('signcard').scrollIntoView({behavior:'smooth'}); wireForm(); };
      // if this doc already has a signature (came back), open the form
      if(sigs[step]){ document.getElementById('signcard').style.display='block'; document.getElementById('start').style.display='none'; wireForm(); }
    }

    function updatePaper(){ document.getElementById('paper').innerHTML=paperHtml(step); }

    function wireForm(){
      app.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{ mode=b.dataset.m; drawn=false; render(); document.getElementById('signcard').style.display='block'; document.getElementById('start').style.display='none'; wireForm(); });
      const ack=document.getElementById('ack'), go=document.getElementById('go');
      const currentSig=()=>{
        if(mode==='draw') return drawn ? {method:'draw', value:document.getElementById('pad').toDataURL('image/png'), name:data.owner_name||''} : null;
        const n=(document.getElementById('typed').value||'').trim();
        return n.length>1 ? {method:'type', value:n, name:n} : null;
      };
      const preview=()=>{ sigs[step]=currentSig(); updatePaper(); go.disabled = !(ack.checked && sigs[step]); };
      ack.onchange=preview;
      if(mode==='type'){ const t=document.getElementById('typed'); t.addEventListener('input',preview); }
      if(mode==='draw'){ initPad(preview); document.getElementById('clr').onclick=()=>{ctx.clearRect(0,0,9999,9999);drawn=false;preview();}; }
      preview();
      go.onclick=()=>{
        sigs[step]=currentSig(); if(!sigs[step]||!ack.checked) return;
        if(step==='agreement' && data.nda_markdown){ step='nda'; window.scrollTo(0,0); render(); }
        else finish();
      };
    }

    function initPad(sync){
      const c=document.getElementById('pad'); const r=c.getBoundingClientRect();
      c.width=r.width*2; c.height=300; ctx=c.getContext('2d'); ctx.scale(2,2); ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.strokeStyle='#16324a';
      const pos=e=>{const b=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return {x:t.clientX-b.left,y:t.clientY-b.top};};
      const start=e=>{e.preventDefault();last=pos(e);drawn=true;sync&&sync();};
      const move=e=>{if(!last)return;e.preventDefault();const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;};
      const end=()=>{ if(last){last=null; sync&&sync();} };
      c.addEventListener('mousedown',start);c.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
      c.addEventListener('touchstart',start);c.addEventListener('touchmove',move);c.addEventListener('touchend',end);
    }

    function blobToBase64(blob){ return new Promise(res=>{ const r=new FileReader(); r.onloadend=()=>res(String(r.result).split(',')[1]); r.readAsDataURL(blob); }); }

    async function finish(){
      const go=document.getElementById('go'); go.disabled=true; go.textContent='Finishing…';
      // Build the signed PDF from both papers (best-effort).
      let pdf_base64=null;
      try{
        const root=document.getElementById('pdfroot');
        root.innerHTML = paperHtml('agreement') + (data.nda_markdown?'<div style="page-break-before:always;height:0"></div>'+paperHtml('nda'):'');
        const blob = await html2pdf().set({margin:[10,10,14,10],image:{type:'jpeg',quality:0.96},html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},jsPDF:{unit:'mm',format:'letter',orientation:'portrait'},pagebreak:{mode:['css','legacy']}}).from(root).outputPdf('blob');
        pdf_base64 = await blobToBase64(blob);
      }catch(e){ console.error('pdf gen failed',e); }

      try{
        const r=await fetch('/api/crm/sign?token='+encodeURIComponent(token),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
          consent:true,
          agreement_signature:sigs.agreement,
          nda_signature:sigs.nda,
          typed_name:(sigs.agreement&&sigs.agreement.name)||data.owner_name||'',
          signature_method:(sigs.agreement&&sigs.agreement.method)||'type',
          signature_value:(sigs.agreement&&sigs.agreement.value)||'',
          pdf_base64
        })});
        if(!r.ok) throw new Error();
        renderDone(false);
      }catch(e){ go.disabled=false; go.textContent='Finish & Send'; alert('Could not finish signing. Please try again.'); }
    }

    function renderDone(already){
      pill.textContent='';
      app.innerHTML='<div class="state"><div class="badge"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1f9d63" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>'
        +'<h2>'+(already?'Already signed':'All signed — thank you!')+'</h2>'
        +'<p>'+(already?'This agreement has already been signed.':'A copy of your signed agreement is on its way to your email. Check your inbox and text for a link to set your password and log into your client portal.')+'</p></div>';
    }

    async function load(){
      if(!token){app.innerHTML='<div class="state"><h2>Invalid link</h2><p>This signing link is missing its token.</p></div>';return;}
      try{
        const r=await fetch('/api/crm/sign?token='+encodeURIComponent(token));
        if(r.status===404){app.innerHTML='<div class="state"><h2>Not found</h2><p>This agreement link is not valid.</p></div>';return;}
        data=await r.json();
        if(data.status==='signed'){renderDone(true);return;}
        render();
      }catch(e){app.innerHTML='<div class="state"><h2>Something went wrong</h2><p>Please refresh and try again.</p></div>';}
    }
    load();
  </script>
</body>
</html>
