<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Sign · Vernon Tech &amp; Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#f2f3f5; --panel:#fff; --ink:#16191d; --body:#4b5563; --muted:#939aa6; --line:#e3e5ea; --line2:#cfd3da; --accent:#ee6a1f; --accent-tint:#fff4ec; --ok:#1f9d63; --ok-tint:#e9f7ef; --fdisp:'Plus Jakarta Sans',system-ui,sans-serif; --fbody:'Inter',system-ui,sans-serif; }
    *{box-sizing:border-box;margin:0;padding:0} body{background:var(--bg);color:var(--body);font-family:var(--fbody);-webkit-font-smoothing:antialiased}
    button{font-family:inherit;cursor:pointer}
    header.nav{background:var(--panel);border-bottom:1px solid var(--line);height:62px;display:flex;align-items:center;padding:0 26px}
    .brand{font-family:var(--fdisp);font-weight:800;font-size:13px;letter-spacing:.14em}
    .brand .b1{color:var(--accent)} .brand .b2{color:var(--muted);letter-spacing:.16em}
    .wrap{max-width:820px;margin:0 auto;padding:40px 22px 120px}
    h1{font-family:var(--fdisp);font-weight:800;font-size:28px;color:var(--ink);letter-spacing:-.01em}
    .sub{color:var(--muted);font-size:15px;margin-top:8px}
    .tabs{display:flex;gap:6px;margin:26px 0 12px}
    .tab{background:none;border:none;padding:8px 4px;font-size:14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent}
    .tab.on{color:var(--ink);border-bottom-color:var(--accent)}
    .doc{white-space:pre-wrap;font-size:13.5px;line-height:1.65;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 22px;max-height:52vh;overflow:auto}
    .sign-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-top:24px}
    .sign-card h2{font-family:var(--fdisp);font-size:17px;font-weight:800;color:var(--ink);margin-bottom:4px}
    .moderow{display:flex;gap:10px;margin:14px 0}
    .mode{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:10px;font-weight:600;color:var(--ink);font-size:13.5px}
    .mode.on{border-color:var(--accent);background:var(--accent-tint);color:var(--accent)}
    canvas{width:100%;height:150px;border:1.5px dashed var(--line2);border-radius:10px;background:#fff;touch-action:none;display:block}
    .typed{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:14px 16px;font-family:'Dancing Script',cursive;font-size:34px;color:var(--ink);text-align:center}
    .typed:focus{outline:none;border-color:var(--accent)}
    .clearbtn{background:none;border:none;color:var(--muted);font-size:12.5px;font-weight:600;margin-top:8px}
    .agree{display:flex;gap:10px;align-items:flex-start;margin:18px 0;font-size:13px;color:var(--body);line-height:1.5}
    .submit{width:100%;background:var(--ink);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;margin-top:6px}
    .submit:disabled{background:#cbd0d8;cursor:not-allowed}
    .meta{font-size:11.5px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.6}
    .state{text-align:center;padding:80px 20px;color:var(--muted)}
    .state h2{font-family:var(--fdisp);color:var(--ink);font-size:22px;margin-bottom:8px}
    .badge{width:64px;height:64px;border-radius:50%;background:var(--ok-tint);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px}
    .total{display:inline-block;background:var(--accent-tint);border:1px solid #f6c9a6;color:var(--accent);font-weight:700;font-size:13px;border-radius:999px;padding:3px 12px;margin-top:12px}
  </style>
</head>
<body>
  <header class="nav"><div class="brand"><span class="b1">VERNON TECH &amp; MEDIA</span> <span class="b2">· AGREEMENT</span></div></header>
  <main class="wrap" id="app"><div class="state">Loading your agreement…</div></main>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    const app = document.getElementById('app');
    const esc = s => (s==null?'':String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])));
    let data=null, docTab='agreement', mode='type', drawn=false, ctx=null, last=null;

    async function load(){
      if(!token){app.innerHTML='<div class="state"><h2>Invalid link</h2><p>This signing link is missing its token.</p></div>';return;}
      try{
        const r=await fetch('/api/crm/sign?token='+encodeURIComponent(token));
        if(r.status===404){app.innerHTML='<div class="state"><h2>Not found</h2><p>This agreement link is not valid.</p></div>';return;}
        data=await r.json();
        if(data.status==='signed'){renderDone(true);return;}
        render();
      }catch(e){app.innerHTML='<div class="state"><h2>Something went wrong</h2><p>Please refresh and try again.</p></div>';}
    }

    function render(){
      const hasNda=!!data.nda_markdown;
      app.innerHTML=
        '<h1>Review &amp; sign</h1><div class="sub">Please review the agreement'+(hasNda?' and NDA':'')+' below, then sign.'+(data.total?'</div><span class="total">Total $'+Number(data.total).toLocaleString()+'</span>':'</div>')
        +'<div class="tabs">'
        +'<button class="tab'+(docTab==='agreement'?' on':'')+'" data-t="agreement">Service Agreement</button>'
        +(hasNda?'<button class="tab'+(docTab==='nda'?' on':'')+'" data-t="nda">NDA</button>':'')
        +'</div>'
        +'<div class="doc">'+esc(docTab==='nda'?data.nda_markdown:data.agreement_markdown)+'</div>'
        +'<div class="sign-card"><h2>Your signature</h2><div class="sub" style="font-size:13px">Draw it, or type your name.</div>'
        +'<div class="moderow"><button class="mode'+(mode==='type'?' on':'')+'" data-m="type">Type</button><button class="mode'+(mode==='draw'?' on':'')+'" data-m="draw">Draw</button></div>'
        +(mode==='draw'
            ? '<canvas id="pad"></canvas><button class="clearbtn" id="clr">Clear</button>'
            : '<input class="typed" id="typed" placeholder="Your full name" value="'+esc(data.owner_name||'')+'" />')
        +'<label class="agree"><input type="checkbox" id="ack" style="margin-top:2px" /> <span>I agree that signing electronically is legally binding, and I authorize the payment terms in this agreement. I agree to contact Vernon Tech &amp; Media directly to resolve any billing question before disputing a charge.</span></label>'
        +'<button class="submit" id="go" disabled>Agree &amp; Sign</button>'
        +'<div class="meta">Signed electronically. Your name, IP address, and a timestamp are recorded for verification.</div>'
        +'</div>';

      app.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{docTab=b.dataset.t;render();});
      app.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.m;drawn=false;render();});
      const ack=document.getElementById('ack'), go=document.getElementById('go');
      const sync=()=>{ const ok=ack.checked && (mode==='draw'?drawn:(document.getElementById('typed').value.trim().length>1)); go.disabled=!ok; };
      ack.onchange=sync;
      if(mode==='type'){document.getElementById('typed').addEventListener('input',sync);}
      if(mode==='draw'){initPad(sync);document.getElementById('clr').onclick=()=>{ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);drawn=false;sync();};}
      go.onclick=submit;
    }

    function initPad(sync){
      const c=document.getElementById('pad'); const r=c.getBoundingClientRect();
      c.width=r.width*2; c.height=300; ctx=c.getContext('2d'); ctx.scale(2,2); ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.strokeStyle='#16191d';
      const pos=e=>{const b=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return {x:t.clientX-b.left,y:t.clientY-b.top};};
      const start=e=>{e.preventDefault();last=pos(e);drawn=true;sync();};
      const move=e=>{if(!last)return;e.preventDefault();const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;};
      const end=()=>{last=null;};
      c.addEventListener('mousedown',start);c.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
      c.addEventListener('touchstart',start);c.addEventListener('touchmove',move);c.addEventListener('touchend',end);
    }

    async function submit(){
      const go=document.getElementById('go'); go.disabled=true; go.textContent='Signing…';
      let payload={ signature_method:mode };
      if(mode==='draw'){ payload.signature_value=document.getElementById('pad').toDataURL('image/png'); payload.typed_name=data.owner_name||''; }
      else { const n=document.getElementById('typed').value.trim(); payload.signature_value=n; payload.typed_name=n; }
      try{
        const r=await fetch('/api/crm/sign?token='+encodeURIComponent(token),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        if(!r.ok)throw new Error();
        renderDone(false);
      }catch(e){ go.disabled=false; go.textContent='Agree & Sign'; alert('Could not sign. Please try again.'); }
    }

    function renderDone(already){
      app.innerHTML='<div class="state"><div class="badge"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1f9d63" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>'
        +'<h2>'+(already?'Already signed':'You\'re all set')+'</h2>'
        +'<p>'+(already?'This agreement has already been signed. Thank you!':'Thanks for signing. Check your email and text — we\'re sending a link to set your password and log into your client portal.')+'</p></div>';
    }
    load();
  </script>
</body>
</html>
