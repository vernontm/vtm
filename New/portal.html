<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Client Portal · Vernon Tech &amp; Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #111112; --surface: #1a1a1c; --surface-2: #222226; --border: #2c2c30;
      --text: #f4f4f5; --muted: #9a9aa2;
      --orange: #ff9b26; --orange-dark: #ee4c27;
      --green: #22c55e; --blue: #3b82f6; --red: #ff5c5c;
      --font-display: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; line-height: 1.5; }
    a { color: var(--orange); }
    .wrap { max-width: 680px; margin: 0 auto; padding: 28px 20px 80px; }

    header.brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .logo { width: 34px; height: 34px; border-radius: 9px; background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; font-family: var(--font-display); flex-shrink: 0; }
    .brand-name { font-family: var(--font-display); font-weight: 800; font-size: 15px; }
    .brand-sub { color: var(--muted); font-size: 11px; }

    .hero { margin-bottom: 22px; }
    .hero h1 { font-family: var(--font-display); font-size: 26px; font-weight: 800; line-height: 1.2; margin-bottom: 8px; }
    .hero p { color: var(--muted); font-size: 15px; }

    .progress-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; margin-bottom: 26px; }
    .progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .progress-label { font-family: var(--font-display); font-weight: 700; font-size: 13px; }
    .progress-count { color: var(--muted); font-size: 13px; }
    .bar { height: 8px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
    .bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--orange), var(--orange-dark)); width: 0%; transition: width .4s ease; }

    .section-title { font-family: var(--font-display); font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 26px 0 12px; }

    .task { display: flex; gap: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px 16px; margin-bottom: 10px; cursor: pointer; transition: border-color .15s, background .15s; }
    .task:hover { border-color: #3a3a40; }
    .task.done { opacity: .6; }
    .check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--muted); flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all .15s; }
    .task.done .check { background: var(--green); border-color: var(--green); }
    .check svg { width: 12px; height: 12px; stroke: #fff; stroke-width: 3.5; fill: none; opacity: 0; transition: opacity .15s; }
    .task.done .check svg { opacity: 1; }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-weight: 600; font-size: 15px; }
    .task.done .task-title { text-decoration: line-through; }
    .task-desc { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .tag { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--orange); background: rgba(255,155,38,.12); border: 1px solid rgba(255,155,38,.3); border-radius: 999px; padding: 2px 8px; margin-top: 8px; }

    .plat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
    .plat-top { display: flex; align-items: center; gap: 10px; }
    .plat-name { font-weight: 700; font-size: 14px; flex: 1; }
    .badge { font-size: 11px; font-weight: 700; border-radius: 999px; padding: 2px 10px; }
    .badge.needed { color: var(--red); background: rgba(255,92,92,.12); border: 1px solid rgba(255,92,92,.3); }
    .badge.requested { color: var(--orange); background: rgba(255,155,38,.12); border: 1px solid rgba(255,155,38,.3); }
    .badge.granted { color: var(--green); background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.3); }
    .plat-process { margin-top: 10px; background: var(--surface-2); border-radius: 8px; padding: 10px 12px; font-size: 12.5px; color: var(--muted); white-space: pre-wrap; }

    .state { text-align: center; padding: 80px 20px; color: var(--muted); }
    .state h2 { font-family: var(--font-display); color: var(--text); font-size: 20px; margin-bottom: 8px; }
    .done-banner { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: var(--green); border-radius: 12px; padding: 14px 16px; font-weight: 600; font-size: 14px; text-align: center; margin-bottom: 22px; }
    .footer { margin-top: 40px; text-align: center; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="state" id="loading">Loading your portal…</div>
  </div>

  <script>
    const CHECK_SVG = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const app = document.getElementById('app');
    let data = null;

    const esc = (s) => (s == null ? '' : String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])));

    function stateHtml(title, msg) {
      return '<div class="state"><h2>' + esc(title) + '</h2><p>' + esc(msg) + '</p></div>';
    }

    async function load() {
      if (!token) { app.innerHTML = stateHtml('No access link', 'This portal link is missing its token. Please use the link we sent you.'); return; }
      try {
        const res = await fetch('/api/crm/portal?token=' + encodeURIComponent(token));
        if (res.status === 404) { app.innerHTML = stateHtml('Portal not found', 'This link is not valid. Please check with your Vernon Tech & Media contact.'); return; }
        if (!res.ok) throw new Error('load failed');
        data = await res.json();
        render();
      } catch (e) {
        app.innerHTML = stateHtml('Something went wrong', 'We could not load your portal. Please refresh or try again shortly.');
      }
    }

    async function toggle(taskId, el) {
      const task = data.tasks.find(t => t.id === taskId);
      if (!task) return;
      const next = task.status === 'done' ? 'todo' : 'done';
      task.status = next; // optimistic
      render();
      try {
        await fetch('/api/crm/portal?token=' + encodeURIComponent(token) + '&task_id=' + taskId, {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: next }),
        });
      } catch (e) { task.status = next === 'done' ? 'todo' : 'done'; render(); }
    }

    function render() {
      const c = data.client;
      const tasks = data.tasks || [];
      const platforms = data.platforms || [];
      const done = tasks.filter(t => t.status === 'done').length;
      const pct = tasks.length ? Math.round(done / tasks.length * 100) : 0;
      const allDone = tasks.length > 0 && done === tasks.length;
      const name = c.owner_name ? c.owner_name.split(' ')[0] : 'there';

      let html = '';
      html += '<header class="brand"><div class="logo">V</div><div><div class="brand-name">Vernon Tech &amp; Media</div><div class="brand-sub">Client Portal</div></div></header>';
      html += '<div class="hero"><h1>Welcome, ' + esc(name) + '</h1><p>A few quick things from you so we can get <strong>' + esc(c.business_name) + '</strong> moving. Check each item off as you finish it.</p></div>';

      if (allDone) html += '<div class="done-banner">All set. Thank you! We have everything we need and will take it from here.</div>';

      if (tasks.length) {
        html += '<div class="progress-card"><div class="progress-top"><span class="progress-label">Your checklist</span><span class="progress-count">' + done + ' of ' + tasks.length + ' done</span></div><div class="bar"><span style="width:' + pct + '%"></span></div></div>';
        html += '<div class="section-title">To do</div>';
        tasks.forEach(t => {
          html += '<div class="task ' + (t.status === 'done' ? 'done' : '') + '" data-id="' + t.id + '">'
            + '<div class="check">' + CHECK_SVG + '</div>'
            + '<div class="task-body"><div class="task-title">' + esc(t.title) + '</div>'
            + (t.description ? '<div class="task-desc">' + esc(t.description) + '</div>' : '')
            + (t.category ? '<span class="tag">' + esc(t.category) + '</span>' : '')
            + '</div></div>';
        });
      }

      if (platforms.length) {
        html += '<div class="section-title">Access status</div>';
        platforms.forEach(p => {
          const st = ['needed','requested','granted'].includes(p.access_status) ? p.access_status : 'needed';
          html += '<div class="plat"><div class="plat-top"><span class="plat-name">' + esc(p.platform_name) + '</span>'
            + '<span class="badge ' + st + '">' + st + '</span></div>'
            + (p.access_process ? '<div class="plat-process">' + esc(p.access_process) + '</div>' : '')
            + '</div>';
        });
      }

      if (!tasks.length && !platforms.length) {
        html += stateHtml('Nothing needed right now', 'You are all caught up. We will reach out if we need anything.');
      }

      html += '<div class="footer">Questions? Reply to our last email or text and we will help.</div>';
      app.innerHTML = html;

      app.querySelectorAll('.task').forEach(el => {
        el.addEventListener('click', () => toggle(el.getAttribute('data-id'), el));
      });
    }

    load();
  </script>
</body>
</html>
