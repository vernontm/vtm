<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>VTM Academy — Coming Soon | Vernon Tech & Media</title>
    <meta name="description" content="VTM Academy is coming soon. Real-world courses on building software, CRMs, and AI-powered tools." />
    <meta property="og:title" content="VTM Academy — Coming Soon" />
    <meta property="og:description" content="Real-world courses on building software, CRMs, and AI-powered tools. Launching soon." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #ff9b26;
            --orange-dark: #ee4c27;
            --bg: #111112;
            --surface: #1a1a1c;
            --border: rgba(255,255,255,0.07);
            --text: #f0f0f0;
            --muted: #8a8a92;
            --font-display: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        html, body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,155,38,0.10) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 80% 80%, rgba(238,76,39,0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            text-align: center;
        }

        .logo {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.02em;
            margin-bottom: 48px;
            color: var(--text);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .logo-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            box-shadow: 0 0 24px rgba(255,155,38,0.5);
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            border: 1px solid rgba(255,155,38,0.3);
            background: rgba(255,155,38,0.08);
            color: var(--orange);
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        h1 {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: clamp(44px, 9vw, 96px);
            line-height: 1;
            letter-spacing: -0.03em;
            margin-bottom: 24px;
            max-width: 900px;
        }
        h1 .accent {
            background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        p.lede {
            font-size: clamp(16px, 2vw, 19px);
            line-height: 1.55;
            color: var(--muted);
            max-width: 560px;
            margin: 0 auto 40px;
        }

        .cta-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 26px;
            border-radius: 12px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
            border: 1px solid transparent;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            color: #1a1a1c;
            box-shadow: 0 10px 30px -10px rgba(255,155,38,0.5);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 40px -10px rgba(255,155,38,0.65); }
        .btn-ghost {
            background: transparent;
            color: var(--text);
            border-color: var(--border);
        }
        .btn-ghost:hover { background: var(--surface); }

        footer {
            margin-top: 64px;
            font-size: 13px;
            color: var(--muted);
        }
        footer a { color: var(--muted); text-decoration: none; }
        footer a:hover { color: var(--orange); }
    </style>
</head>
<body>
    <div class="page">
        <a href="/" class="logo"><span class="logo-dot"></span>Vernon Tech &amp; Media</a>

        <span class="badge">Coming Soon</span>
        <h1>VTM <span class="accent">Academy</span></h1>
        <p class="lede">
            Real-world courses on building software, CRMs, and AI-powered tools —
            taught the way I actually build them. Launching soon.
        </p>

        <div class="cta-row">
            <a class="btn btn-primary" href="/free-gift.html">Get the Free 5-Day CRM Guide</a>
            <a class="btn btn-ghost" href="/">Back to Home</a>
        </div>

        <footer>
            Questions? <a href="/contact.html">Get in touch</a> &nbsp;·&nbsp; © Vernon Tech &amp; Media
        </footer>
    </div>
</body>
</html>
