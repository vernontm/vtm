<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>AI Agent Workshop · Vernon Tech &amp; Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0d1016;--panel:#161b23;--panel2:#1c222c;--line:rgba(255,255,255,.09);--line2:rgba(255,255,255,.14);--text:#eef1f5;--muted:#98a2b0;--gold:#e9b84c;--gold2:#f2cf74;--blue:#4f8cff;--ok:#38d18a;--fdisp:'Plus Jakarta Sans',system-ui,sans-serif;--fbody:'DM Sans',system-ui,sans-serif;--fmono:'JetBrains Mono',monospace}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{background:radial-gradient(1300px 700px at 50% -12%,#1a2130,#0d1016 62%);color:var(--text);font-family:var(--fbody);-webkit-font-smoothing:antialiased}
    button{font-family:inherit;cursor:pointer}
    .stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:5vh 6vw calc(5vh + 70px)}
    .slide{width:100%;max-width:1100px;text-align:center;animation:in .5s cubic-bezier(.2,.7,.2,1)}
    @keyframes in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    .kicker{display:inline-block;font-family:var(--fdisp);font-weight:700;font-size:clamp(12px,1.4vw,15px);letter-spacing:.16em;text-transform:uppercase;color:#0d1016;background:linear-gradient(135deg,var(--gold),var(--gold2));padding:7px 18px;border-radius:999px;margin-bottom:26px}
    h1{font-family:var(--fdisp);font-weight:800;font-size:clamp(34px,6vw,74px);line-height:1.04;letter-spacing:-.015em}
    h1 .g{background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;background-clip:text;color:transparent}
    .sub{color:var(--muted);font-size:clamp(16px,2.2vw,24px);margin-top:20px;line-height:1.5;max-width:820px;margin-left:auto;margin-right:auto}
    h2{font-family:var(--fdisp);font-weight:800;font-size:clamp(28px,4.6vw,56px);line-height:1.08;margin-bottom:28px}
    h2 .g{color:var(--gold)}
    ul.big{list-style:none;display:inline-block;text-align:left;margin-top:8px}
    ul.big li{display:flex;align-items:flex-start;gap:16px;font-size:clamp(17px,2.2vw,27px);font-weight:500;padding:10px 0;color:var(--text)}
    ul.big li .n{flex-shrink:0;width:clamp(30px,3vw,42px);height:clamp(30px,3vw,42px);border-radius:11px;background:rgba(233,184,76,.14);color:var(--gold);font-family:var(--fdisp);font-weight:800;display:flex;align-items:center;justify-content:center;font-size:clamp(15px,1.6vw,20px)}
    .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;max-width:820px;margin:0 auto}
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px 22px}
    .stat .v{font-family:var(--fdisp);font-weight:800;font-size:clamp(30px,4.6vw,52px);color:var(--gold);line-height:1}
    .stat .k{color:var(--muted);font-size:clamp(13px,1.5vw,17px);margin-top:10px;font-weight:500}
    .cost{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;margin-top:8px}
    .costc{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:30px 34px;min-width:260px}
    .costc.hi{border-color:rgba(233,184,76,.4);box-shadow:0 0 0 1px rgba(233,184,76,.25) inset}
    .costc .lab{color:var(--muted);font-size:clamp(13px,1.5vw,16px);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
    .costc .amt{font-family:var(--fdisp);font-weight:800;font-size:clamp(30px,4.4vw,52px);margin-top:10px}
    .costc.hi .amt{background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;background-clip:text;color:transparent}
    .costc .sm{color:var(--muted);font-size:clamp(12px,1.3vw,15px);margin-top:8px}
    .flow{font-family:var(--fmono);font-size:clamp(12px,1.6vw,19px);line-height:1.9;color:#dbe3ee;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:clamp(20px,3vw,34px);display:inline-block;text-align:left;white-space:pre}
    .flow .g{color:var(--gold)}
    .steps{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 26px;max-width:900px;margin:10px auto 0;text-align:left}
    .steps div{display:flex;gap:12px;align-items:center;font-size:clamp(14px,1.7vw,21px);font-weight:500;padding:6px 0}
    .steps div b{color:var(--gold);font-family:var(--fdisp);font-weight:800;min-width:26px}
    .qrbox{background:#fff;border-radius:26px;padding:22px;display:inline-block;margin:22px 0 14px;box-shadow:0 30px 80px -20px rgba(0,0,0,.7)}
    .qrbox>div{width:min(38vh,330px);height:min(38vh,330px)}
    .qrbox img,.qrbox canvas{width:100%!important;height:100%!important;display:block}
    .scan{font-family:var(--fdisp);font-weight:800;font-size:clamp(18px,2.4vw,30px);color:var(--gold)}
    .scan .u{color:var(--muted);font-weight:600;font-size:.66em;display:block;margin-top:8px}
    /* chrome */
    .nav{position:fixed;bottom:22px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:16px;z-index:10}
    .nav button{background:var(--panel);border:1px solid var(--line2);color:var(--text);width:44px;height:44px;border-radius:12px;font-size:20px;display:flex;align-items:center;justify-content:center}
    .nav button:hover{border-color:var(--gold);color:var(--gold)}
    .dots{display:flex;gap:8px}
    .dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:.2s}
    .dot.on{background:var(--gold);width:26px;border-radius:6px}
    .count{position:fixed;top:20px;right:24px;font-family:var(--fdisp);font-weight:700;color:var(--muted);font-size:13px;letter-spacing:.05em;z-index:10}
    .brand{position:fixed;top:20px;left:24px;font-family:var(--fdisp);font-weight:800;font-size:12px;letter-spacing:.16em;color:var(--muted);z-index:10}
    .brand b{color:var(--text)}
    .progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));z-index:11;transition:width .3s}
    .hint{position:fixed;bottom:22px;right:24px;color:var(--muted);font-size:12px;z-index:10}
    @media(max-width:720px){.stats,.steps{grid-template-columns:1fr}.hint{display:none}}
  </style>
</head>
<body>
  <div class="progress" id="prog"></div>
  <div class="brand"><b>VERNON TECH &amp; MEDIA</b> · KATY</div>
  <div class="count" id="count"></div>
  <div class="stage"><div class="slide" id="slide"></div></div>
  <div class="nav"><button id="prev">&#8249;</button><div class="dots" id="dots"></div><button id="next">&#8250;</button></div>
  <div class="hint">Arrow keys or tap to advance</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    var ORIGIN=location.origin;
    var slides=[
      // 1 — check-in QR
      {qr:{text:ORIGIN+'/workshop',id:'qrCheck'},html:''
        +'<div class="kicker">Live Workshop</div>'
        +'<h1>Building an <span class="g">AI Agent</span>, Live</h1>'
        +'<div class="qrbox"><div id="qrCheck"></div></div>'
        +'<div class="scan">Scan to check in<span class="u">Unlock tonight\'s prompts, code, and resources at vernontm.com/workshop</span></div>'},
      // 2 — what you're building
      {html:''
        +'<h2>By the end, <span class="g">you own</span> a bot that:</h2>'
        +'<ul class="big">'
        +'<li><span class="n">1</span>Finds new creators on TikTok or Instagram every day</li>'
        +'<li><span class="n">2</span>Writes each one a personal email</li>'
        +'<li><span class="n">3</span>Sends it from your inbox</li>'
        +'<li><span class="n">4</span>Reads the reply when it comes in</li>'
        +'<li><span class="n">5</span>Answers the reply</li>'
        +'<li><span class="n">6</span>Books the appointment</li>'
        +'</ul>'
        +'<div class="sub" style="margin-top:26px">You do not touch it. It just runs.</div>'},
      // 3 — the numbers
      {html:''
        +'<div class="kicker">Real client, real results</div>'
        +'<h2>What this bot has <span class="g">actually done</span></h2>'
        +'<div class="stats">'
        +'<div class="stat"><div class="v">1,000+</div><div class="k">cold emails sent, on its own</div></div>'
        +'<div class="stat"><div class="v">15-20%</div><div class="k">reply rate</div></div>'
        +'<div class="stat"><div class="v">~80</div><div class="k">creators booked completely free</div></div>'
        +'<div class="stat"><div class="v">~30 sec</div><div class="k">of my time per day</div></div>'
        +'</div>'},
      // 4 — cost
      {html:''
        +'<h2>What it <span class="g">costs to run</span></h2>'
        +'<div class="cost">'
        +'<div class="costc hi"><div class="lab">This bot</div><div class="amt">$30-55</div><div class="sm">per month, all in</div></div>'
        +'<div class="costc"><div class="lab">A human VA</div><div class="amt" style="color:var(--muted)">$2k-4k</div><div class="sm">per month, and off at 2am</div></div>'
        +'</div>'
        +'<div class="sub" style="margin-top:26px">Vercel + Supabase + Telegram + Gmail: free. Apify ~$10-15. Claude ~$20-40.</div>'},
      // 5 — how it works
      {html:''
        +'<h2>How it <span class="g">works</span></h2>'
        +'<div class="flow">'
        +'  <span class="g">TikTok / Instagram</span>\n'
        +'        |  Apify scrapes\n'
        +'        v\n'
        +'  <span class="g">Supabase</span> -> <span class="g">Claude writes</span> -> <span class="g">Gmail sends</span>\n'
        +'        ^                                   |\n'
        +'        |         Creator replies <--------- \n'
        +'        v\n'
        +'  <span class="g">Claude reads the reply, decides</span>\n'
        +'        |\n'
        +'  Auto-send  OR  ping me on Telegram'
        +'</div>'
        +'<div class="sub" style="margin-top:22px">Five moving parts. We build them one at a time, inside Claude Code.</div>'},
      // 6 — the build
      {html:''
        +'<h2>Tonight\'s build, <span class="g">10 steps</span></h2>'
        +'<div class="steps">'
        +'<div><b>1</b>Make the project</div><div><b>6</b>Read the replies</div>'
        +'<div><b>2</b>Set up the database</div><div><b>7</b>Telegram kill switch</div>'
        +'<div><b>3</b>Find the leads</div><div><b>8</b>Put it on a schedule</div>'
        +'<div><b>4</b>Write the email</div><div><b>9</b>Live dashboard</div>'
        +'<div><b>5</b>Send the email</div><div><b>10</b>The rules that keep it honest</div>'
        +'</div>'
        +'<div class="sub" style="margin-top:26px">Every step is one prompt you paste into Claude Code. No terminal. No code by hand.</div>'},
      // 7 — what you leave with
      {html:''
        +'<h2>What you <span class="g">walk out with</span></h2>'
        +'<ul class="big">'
        +'<li><span class="n">&#10003;</span>Your own AI outreach agent, live on the internet</li>'
        +'<li><span class="n">&#10003;</span>A GitHub repo + a real Vercel URL you can share</li>'
        +'<li><span class="n">&#10003;</span>A Telegram bot on your phone that pings you</li>'
        +'<li><span class="n">&#10003;</span>A PROMPTS.md file to rebuild this for any business next week</li>'
        +'</ul>'},
      // 8 — book a call QR
      {qr:{text:'https://vernontm.com/book-call',id:'qrCall'},html:''
        +'<div class="kicker">Before you go</div>'
        +'<h1>Book a <span class="g">free 1-on-1</span> with me, today</h1>'
        +'<div class="qrbox"><div id="qrCall"></div></div>'
        +'<div class="scan">Scan to grab a time<span class="u">We\'ll map the first thing in your business you should automate, vernontm.com/book-call</span></div>'}
    ];

    var i=0, slideEl=document.getElementById('slide'), dotsEl=document.getElementById('dots');
    slides.forEach(function(_,idx){ var d=document.createElement('div'); d.className='dot'; d.onclick=function(){go(idx);}; dotsEl.appendChild(d); });

    function render(){
      var s=slides[i];
      slideEl.style.animation='none'; void slideEl.offsetWidth; slideEl.style.animation='';
      slideEl.innerHTML=s.html;
      if(s.qr){ try{ new QRCode(document.getElementById(s.qr.id),{text:s.qr.text,width:360,height:360,colorDark:'#0d1016',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M}); }catch(e){} }
      document.getElementById('count').textContent=(i+1)+' / '+slides.length;
      document.getElementById('prog').style.width=((i+1)/slides.length*100)+'%';
      Array.prototype.forEach.call(dotsEl.children,function(d,idx){ d.className='dot'+(idx===i?' on':''); });
    }
    function go(n){ i=Math.max(0,Math.min(slides.length-1,n)); render(); }
    function next(){ if(i<slides.length-1) go(i+1); }
    function prev(){ if(i>0) go(i-1); }
    document.getElementById('next').onclick=next;
    document.getElementById('prev').onclick=prev;
    document.addEventListener('keydown',function(e){ if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();next();} else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev();} else if(e.key==='Home'){go(0);} else if(e.key==='End'){go(slides.length-1);} });
    document.querySelector('.stage').addEventListener('click',function(e){ if(e.clientX < window.innerWidth*0.32) prev(); else next(); });
    render();
  </script>
</body>
</html>
